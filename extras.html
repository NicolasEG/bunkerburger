<style>

.extras-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(460px,1fr));
  gap:24px;
}

/* =========================================================
   CATEGORY
========================================================= */

.extra-category{
  margin:70px 0 30px;
}

.extra-category h3{

  font-size:82px;

  line-height:.85;

  text-transform:uppercase;

  letter-spacing:-4px;

  margin-bottom:14px;
}

.extra-category .line{
  width:70px;
  height:6px;

  border-radius:999px;

  background:var(--yellow);
}

/* =========================================================
   CARD
========================================================= */

.extra-card{
  position:relative;

  height:260px;

  overflow:hidden;

  border-radius:30px;

  background:
  linear-gradient(
  180deg,
  rgba(16,16,16,.92),
  rgba(3,3,3,.96)
  );

  border:
  1px solid rgba(255,255,255,.08);

  box-shadow:
  0 24px 70px rgba(0,0,0,.65);

  transition:.3s ease;
}

.extra-card:hover{

  transform:
  translateY(-6px);

  border-color:
  rgba(255,196,0,.35);

  box-shadow:
  0 35px 90px rgba(0,0,0,.85),
  0 0 35px rgba(255,196,0,.08);
}

/* =========================================================
   IMAGE
========================================================= */

.extra-image{

  position:absolute;

  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;

  object-position:center;

  transition:.35s ease;
}

.extra-card:hover .extra-image{

  transform:
  scale(1.04);
}

/* =========================================================
   OVERLAY
========================================================= */

.extra-card::after{

  content:'';

  position:absolute;

  inset:0;

  background:
  linear-gradient(
  180deg,
  rgba(0,0,0,.15),
  rgba(0,0,0,.65)
  );

  z-index:2;
}

/* =========================================================
   PRICE
========================================================= */

.extra-price{

  position:absolute;

  right:24px;
  bottom:18px;

  font-size:54px;

  line-height:1;

  font-weight:1000;

  color:var(--yellow);

  text-shadow:
  0 0 18px rgba(255,196,0,.25);

  z-index:20;
}

/* =========================================================
   BUTTON
========================================================= */

.extra-add{
  position:absolute;

  left:22px;
  bottom:18px;

  width:58px;
  height:58px;

  border-radius:50%;

  border:
  3px solid var(--yellow);

  background:#000;

  color:var(--yellow);

  font-size:36px;

  font-weight:1000;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.25s ease;

  z-index:30;
}

.extra-add:hover{

  background:var(--yellow);

  color:#000;

  transform:
  rotate(90deg)
  scale(1.08);
}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:950px){

  .extras-grid{
    grid-template-columns:1fr;
  }

  .extra-card{
    height:240px;
  }

  .extra-price{
    font-size:44px;
  }

}

</style>

<!-- MUSIC -->

<audio id="bgMusic" loop>
  <source src="assets/audio/musica.mp3" type="audio/mpeg">
</audio>

<script>

const music =
document.getElementById('bgMusic');

music.volume = 0.15;

// recuperar tiempo mientras la pestaña siga abierta
const savedTime =
sessionStorage.getItem('musicTime');

if(savedTime){

  music.currentTime =
  parseFloat(savedTime);

}

// intentar autoplay
music.play().then(() => {

  sessionStorage.setItem(
    'musicPlaying',
    'true'
  );

}).catch(() => {

  // fallback por bloqueo del navegador
  document.addEventListener('click', async () => {

    try{

      await music.play();

      sessionStorage.setItem(
        'musicPlaying',
        'true'
      );

    }catch(e){}

  }, { once:true });

});

// restaurar si ya venía sonando
if(
  sessionStorage.getItem('musicPlaying')
  === 'true'
){

  music.play().catch(() => {});

}

// guardar tiempo constantemente
setInterval(() => {

  sessionStorage.setItem(
    'musicTime',
    music.currentTime
  );

}, 1000);

// guardar estado
music.addEventListener('play', () => {

  sessionStorage.setItem(
    'musicPlaying',
    'true'
  );

});

music.addEventListener('pause', () => {

  sessionStorage.setItem(
    'musicPlaying',
    'false'
  );

});

</script>
