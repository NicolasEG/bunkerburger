<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Búnker Food | Tu pedido</title>

<link rel="stylesheet" href="assets/css/styles.css" />

<style>

/* =========================================================
   SHELL
========================================================= */

.checkout-shell{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:140px;
}

/* =========================================================
   CARD
========================================================= */

.checkout-card{

  position:relative;

  overflow:hidden;

  border-radius:34px;

  padding:40px;

  background:
  linear-gradient(
  180deg,
  rgba(16,16,16,.92),
  rgba(3,3,3,.96)
  );

  border:
  1px solid rgba(255,255,255,.08);

  box-shadow:
  0 30px 90px rgba(0,0,0,.75);

  margin-top:30px;
}

.checkout-card::before{

  content:'';

  position:absolute;

  inset:0;

  background:
  radial-gradient(
  circle at top right,
  rgba(255,196,0,.08),
  transparent 40%
  );

  pointer-events:none;
}

/* =========================================================
   ITEMS
========================================================= */

.summary-item{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:20px;

  padding:24px 0;

  border-bottom:
  1px solid rgba(255,255,255,.08);
}

.summary-item:last-child{
  border-bottom:none;
}

.summary-item h4{

  font-size:34px;

  line-height:.95;

  letter-spacing:-1px;

  text-transform:uppercase;

  margin-bottom:8px;
}

.summary-item small{

  color:rgba(255,255,255,.55);

  font-size:13px;

  letter-spacing:2px;
}

.summary-price{

  display:flex;
  align-items:center;
  gap:16px;
}

.summary-price strong{

  font-size:34px;

  color:var(--yellow);

  line-height:1;

  white-space:nowrap;

  text-shadow:
  0 0 18px rgba(255,196,0,.25);
}

.summary-price button{

  width:46px;
  height:46px;

  border-radius:50%;

  border:
  2px solid rgba(255,255,255,.12);

  background:#111;

  color:#fff;

  font-size:22px;

  cursor:pointer;

  transition:.25s ease;
}

.summary-price button:hover{

  border-color:#ff3b30;

  color:#ff3b30;

  transform:
  rotate(90deg);
}

/* =========================================================
   TOTAL
========================================================= */

.total-row{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-top:34px;

  padding-top:28px;

  border-top:
  2px solid rgba(255,196,0,.18);
}

.total-row span{

  font-size:28px;

  text-transform:uppercase;

  letter-spacing:2px;
}

.total-row strong{

  font-size:58px;

  line-height:1;

  color:var(--yellow);

  text-shadow:
  0 0 24px rgba(255,196,0,.3);
}

/* =========================================================
   BUTTONS
========================================================= */

.checkout-actions{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:18px;

  margin-top:34px;
}

.full-btn{

  height:74px;

  border:none;

  border-radius:24px;

  font-size:16px;

  font-weight:900;

  letter-spacing:2px;

  cursor:pointer;

  transition:.25s ease;
}

.full-btn.primary{

  background:var(--yellow);

  color:#000;

  box-shadow:
  0 18px 40px rgba(255,196,0,.2);
}

.full-btn.primary:hover{

  transform:
  translateY(-4px);

  box-shadow:
  0 24px 50px rgba(255,196,0,.28);
}

.full-btn.ghost{

  background:#111;

  border:
  1px solid rgba(255,255,255,.08);

  color:#fff;
}

.full-btn.ghost:hover{

  border-color:
  rgba(255,196,0,.35);

  color:var(--yellow);
}

/* =========================================================
   QR
========================================================= */

.qr-card{

  margin-top:34px;

  display:flex;
  align-items:center;

  gap:24px;

  padding:28px;

  border-radius:30px;

  background:
  linear-gradient(
  180deg,
  rgba(16,16,16,.92),
  rgba(3,3,3,.96)
  );

  border:
  1px solid rgba(255,255,255,.08);

  box-shadow:
  0 24px 70px rgba(0,0,0,.65);
}

.fake-qr{

  width:120px;
  height:120px;

  border-radius:20px;

  background:
  repeating-linear-gradient(
  45deg,
  #fff 0 10px,
  #111 10px 20px
  );
}

.qr-card h3{

  font-size:34px;

  margin-bottom:8px;

  text-transform:uppercase;
}

.qr-card p{

  color:rgba(255,255,255,.65);

  line-height:1.5;
}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:900px){

  .checkout-card{
    padding:28px;
  }

  .summary-item{
    flex-direction:column;
    align-items:flex-start;
  }

  .summary-price{
    width:100%;
    justify-content:space-between;
  }

  .summary-item h4{
    font-size:28px;
  }

  .summary-price strong{
    font-size:28px;
  }

  .total-row strong{
    font-size:44px;
  }

  .checkout-actions{
    grid-template-columns:1fr;
  }

  .qr-card{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>

</head>

<body data-page="resumen">

<div class="grain"></div>
<div class="smoke smoke-a"></div>
<div class="sparks"></div>

<header class="topbar sticky">

  <a
    class="back"
    href="bebidas.html"
  >
    ←
  </a>

  <div class="table-pill">
    MESA
    <span id="mesaLabel">07</span>
  </div>

  <a class="cart-icon" href="resumen.html">
    🛒
    <b id="cartCount">0</b>
  </a>

</header>

<main class="checkout-shell">

  <section class="section-title reveal">

    <p class="eyebrow">
      PASO 4
    </p>

    <h2>
      Confirmá tu pedido
    </h2>

    <p>
      Revisá el detalle y envialo por WhatsApp.
    </p>

  </section>

  <!-- CARD -->

  <section class="checkout-card reveal delay">

    <div id="orderList"></div>

    <div class="total-row">

      <span>
        TOTAL
      </span>

      <strong id="orderTotal">
        $0
      </strong>

    </div>

    <div class="checkout-actions">

      <button
        id="sendWhatsApp"
        class="full-btn primary"
      >
        ENVIAR PEDIDO
      </button>

      <button
        id="clearOrder"
        class="full-btn ghost"
      >
        VACIAR PEDIDO
      </button>

    </div>

  </section>

  <!-- QR -->

  <section class="qr-card reveal delay2">

    <div class="fake-qr"></div>

    <div>

      <h3>
        QR DE MESA
      </h3>

      <p>
        Después generamos un QR real por cada mesa:
        menu.html?mesa=01, 02, 03...
      </p>

    </div>

  </section>

</main>

<script src="assets/js/app.js"></script>

</body>
</html>
