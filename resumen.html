<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Búnker Food | Tu pedido</title>

<link rel="stylesheet" href="assets/css/styles.css" />

<style>

/* =========================================================
   SHELL
========================================================= */

.checkout-shell{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:140px;
}

/* =========================================================
   CARD
========================================================= */

.checkout-card{

  position:relative;

  overflow:hidden;

  border-radius:34px;

  padding:40px;

  background:
  linear-gradient(
  180deg,
  rgba(16,16,16,.92),
  rgba(3,3,3,.96)
  );

  border:
  1px solid rgba(255,255,255,.08);

  box-shadow:
  0 30px 90px rgba(0,0,0,.75);

  margin-top:30px;
}

.checkout-card::before{

  content:'';

  position:absolute;

  inset:0;

  background:
  radial-gradient(
  circle at top right,
  rgba(255,196,0,.08),
  transparent 40%
  );

  pointer-events:none;
}

/* =========================================================
   ITEMS
========================================================= */

.summary-item{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:20px;

  padding:24px 0;

  border-bottom:
  1px solid rgba(255,255,255,.08);
}

.summary-item:last-child{
  border-bottom:none;
}

.summary-item h4{

  font-size:34px;

  line-height:.95;

  letter-spacing:-1px;

  text-transform:uppercase;

  margin-bottom:8px;
}

.summary-item small{

  color:rgba(255,255,255,.55);

  font-size:13px;

  letter-spacing:2px;
}

.summary-price{

  display:flex;
  align-items:center;
  gap:16px;
}

.summary-price strong{

  font-size:34px;

  color:var(--yellow);

  line-height:1;

  white-space:nowrap;

  text-shadow:
  0 0 18px rgba(255,196,0,.25);
}

.summary-price button{

  width:46px;
  height:46px;

  border-radius:50%;

  border:
  2px solid rgba(255,255,255,.12);

  background:#111;

  color:#fff;

  font-size:22px;

  cursor:pointer;

  transition:.25s ease;
}

.summary-price button:hover{

  border-color:#ff3b30;

  color:#ff3b30;

  transform:
  rotate(90deg);
}

/* =========================================================
   FORM
========================================================= */

.checkout-form{

  margin-top:34px;

  display:grid;

  gap:18px;
}

.checkout-input,
.checkout-textarea{

  width:100%;

  border:none;

  outline:none;

  border-radius:22px;

  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.08);

  color:#fff;

  padding:20px 22px;

  font-size:15px;

  font-family:inherit;

  backdrop-filter:blur(10px);

  transition:.25s ease;
}

.checkout-input:focus,
.checkout-textarea:focus{

  border-color:
  rgba(255,196,0,.4);

  box-shadow:
  0 0 25px rgba(255,196,0,.08);
}

.checkout-input::placeholder,
.checkout-textarea::placeholder{
  color:rgba(255,255,255,.38);
}

.checkout-textarea{

  resize:none;

  min-height:130px;
}

.delivery-box{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:16px;
}

.delivery-btn{

  height:68px;

  border-radius:22px;

  border:
  1px solid rgba(255,255,255,.08);

  background:
  rgba(255,255,255,.04);

  color:#fff;

  font-size:15px;

  font-weight:900;

  letter-spacing:1px;

  cursor:pointer;

  transition:.25s ease;
}

.delivery-btn.active{

  background:var(--yellow);

  color:#000;

  border-color:var(--yellow);

  box-shadow:
  0 0 28px rgba(255,196,0,.15);
}

/* =========================================================
   TOTAL
========================================================= */

.total-row{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-top:34px;

  padding-top:28px;

  border-top:
  2px solid rgba(255,196,0,.18);
}

.total-row span{

  font-size:28px;

  text-transform:uppercase;

  letter-spacing:2px;
}

.total-row strong{

  font-size:58px;

  line-height:1;

  color:var(--yellow);

  text-shadow:
  0 0 24px rgba(255,196,0,.3);
}

/* =========================================================
   BUTTONS
========================================================= */

.checkout-actions{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:18px;

  margin-top:34px;
}

.full-btn{

  height:74px;

  border:none;

  border-radius:24px;

  font-size:16px;

  font-weight:900;

  letter-spacing:2px;

  cursor:pointer;

  transition:.25s ease;
}

.full-btn.primary{

  background:var(--yellow);

  color:#000;

  box-shadow:
  0 18px 40px rgba(255,196,0,.2);
}

.full-btn.primary:hover{

  transform:
  translateY(-4px);

  box-shadow:
  0 24px 50px rgba(255,196,0,.28);
}

.full-btn.ghost{

  background:#111;

  border:
  1px solid rgba(255,255,255,.08);

  color:#fff;
}

.full-btn.ghost:hover{

  border-color:
  rgba(255,196,0,.35);

  color:var(--yellow);
}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:900px){

  .checkout-card{
    padding:28px;
  }

  .summary-item{
    flex-direction:column;
    align-items:flex-start;
  }

  .summary-price{
    width:100%;
    justify-content:space-between;
  }

  .summary-item h4{
    font-size:28px;
  }

  .summary-price strong{
    font-size:28px;
  }

  .total-row strong{
    font-size:44px;
  }

  .checkout-actions{
    grid-template-columns:1fr;
  }

  .delivery-box{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body data-page="resumen">

<div class="grain"></div>
<div class="smoke smoke-a"></div>
<div class="sparks"></div>

<header class="topbar sticky">

  <a
    class="back"
    href="bebidas.html"
  >
    ←
  </a>

  <a class="cart-icon" href="resumen.html">
    🛒
    <b id="cartCount">0</b>
  </a>

</header>

<main class="checkout-shell">

  <section class="section-title reveal">

    <p class="eyebrow">
      PASO 4
    </p>

    <h2>
      Confirmá tu pedido
    </h2>

    <p>
      Revisá el detalle y envialo por WhatsApp.
    </p>

  </section>

  <!-- CARD -->

  <section class="checkout-card reveal delay">

    <div id="orderList"></div>

    <!-- FORM -->

    <div class="checkout-form">

      <input
        type="text"
        id="customerName"
        class="checkout-input"
        placeholder="Nombre del cliente"
      >

      <input
        type="text"
        id="customerAddress"
        class="checkout-input"
        placeholder="Dirección"
      >

      <div class="delivery-box">

        <button
          type="button"
          class="delivery-btn active"
          id="deliveryBtn"
        >
          🚗 DELIVERY
        </button>

        <button
          type="button"
          class="delivery-btn"
          id="pickupBtn"
        >
          🛍️ RETIRA EN LOCAL
        </button>

      </div>

      <textarea
        id="orderNotes"
        class="checkout-textarea"
        placeholder="Notas para el local... Ej: sin cebolla, llamar al llegar, etc."
      ></textarea>

    </div>

    <!-- TOTAL -->

    <div class="total-row">

      <span>
        TOTAL
      </span>

      <strong id="orderTotal">
        $0
      </strong>

    </div>

    <!-- ACTIONS -->

    <div class="checkout-actions">

      <button
        id="sendWhatsApp"
        class="full-btn primary"
      >
        ENVIAR PEDIDO
      </button>

      <button
        id="clearOrder"
        class="full-btn ghost"
      >
        VACIAR PEDIDO
      </button>

    </div>

  </section>

</main>

<script src="assets/js/app.js"></script>

<script>

let deliveryType = "Delivery";

const deliveryBtn = document.getElementById("deliveryBtn");
const pickupBtn = document.getElementById("pickupBtn");

deliveryBtn.addEventListener("click", () => {

  deliveryType = "Delivery";

  deliveryBtn.classList.add("active");
  pickupBtn.classList.remove("active");

});

pickupBtn.addEventListener("click", () => {

  deliveryType = "Retira en local";

  pickupBtn.classList.add("active");
  deliveryBtn.classList.remove("active");

});

document.getElementById("sendWhatsApp").addEventListener("click", () => {

  const customerName =
    document.getElementById("customerName").value.trim();

  const customerAddress =
    document.getElementById("customerAddress").value.trim();

  const orderNotes =
    document.getElementById("orderNotes").value.trim();

  const cart =
    JSON.parse(localStorage.getItem("bunker_cart") || "[]");

  if(cart.length === 0){
    alert("Tu pedido está vacío");
    return;
  }

  let total = 0;

let message =
`*NUEVO PEDIDO - BÚNKER FOOD* %0A%0A`;

message +=
`Cliente: ${customerName || "-"}%0A`;

message +=
`Dirección: ${customerAddress || "-"}%0A`;

message +=
`Tipo: ${deliveryType}%0A`;

if(orderNotes){
  message += `Notas: ${orderNotes}%0A`;
}

message += `%0A━━━━━━━━━━━━━━%0A`;

cart.forEach(item => {

  total += item.price;

  message +=
`%0A${item.name}`;

  if(item.size){
    message += ` (${item.size})`;
  }

  message += `%0A$${item.price.toLocaleString("es-AR")}%0A`;

});

message += `%0A━━━━━━━━━━━━━━%0A`;

message +=
`TOTAL: $${total.toLocaleString("es-AR")}`;

  window.open(
    `https://wa.me/542257665239?text=${message}`,
    "_blank"
  );

});

</script>

<!-- MUSIC -->

<audio
  id="bgMusic"
  loop
  preload="auto"
>
  <source src="assets/audio/musica.mp3" type="audio/mpeg">
</audio>

<script>

const music =
document.getElementById('bgMusic');

music.volume = 0.15;

// restaurar mute
const savedMuted =
sessionStorage.getItem('musicMuted');

if(savedMuted === 'true'){

  music.muted = true;

}

// recuperar tiempo mientras la pestaña siga abierta
const savedTime =
sessionStorage.getItem('musicTime');

if(savedTime){

  music.currentTime =
  parseFloat(savedTime);

}

// intentar autoplay
music.play().then(() => {

  sessionStorage.setItem(
    'musicPlaying',
    'true'
  );

}).catch(() => {

  // fallback por bloqueo del navegador
  document.addEventListener('click', async () => {

    try{

      await music.play();

      sessionStorage.setItem(
        'musicPlaying',
        'true'
      );

    }catch(e){}

  }, { once:true });

});

// restaurar si ya venía sonando
if(
  sessionStorage.getItem('musicPlaying')
  === 'true'
){

  setTimeout(() => {

    music.play().catch(() => {});

  }, 10);

}

// guardar tiempo constantemente
setInterval(() => {

  sessionStorage.setItem(
    'musicTime',
    music.currentTime
  );

}, 1000);

// guardar estado
music.addEventListener('play', () => {

  sessionStorage.setItem(
    'musicPlaying',
    'true'
  );

});

music.addEventListener('pause', () => {

  sessionStorage.setItem(
    'musicPlaying',
    'false'
  );

});

</script>

</body>
</html>
