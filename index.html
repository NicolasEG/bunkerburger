<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Búnker Food | Menú Digital</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  position:relative;
}

/* =========================================
   HERO BACKGROUND
========================================= */

.hero-background{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.hero-background img{
  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;
  object-position:left center;

  opacity:1;
}

/* =========================================
   VIDEO HERO
========================================= */

.hero-video-wrap{

  position:absolute;

  right:0;
  top:0;

  width:52%;
  height:100%;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:1;

  overflow:hidden;

  pointer-events:none;
}

.hero-video{

  width:100%;
  height:100%;

  object-fit:cover;

  object-position:center;

  opacity:1;

  mix-blend-mode:screen;

  filter:
  brightness(1)
  contrast(1.22)
  saturate(1.28)
  drop-shadow(0 0 45px rgba(255,196,0,.22));

  transform:scale(.94);

  mask-image:
  radial-gradient(
  circle at center,
  rgba(0,0,0,1) 34%,
  rgba(0,0,0,.98) 48%,
  rgba(0,0,0,.78) 64%,
  rgba(0,0,0,0) 84%
  );

  -webkit-mask-image:
  radial-gradient(
  circle at center,
  rgba(0,0,0,1) 34%,
  rgba(0,0,0,.98) 48%,
  rgba(0,0,0,.78) 64%,
  rgba(0,0,0,0) 84%
  );
}

/* =========================================
   OVERLAY
========================================= */

.hero-overlay{
  position:absolute;
  inset:0;

  background:
  linear-gradient(
  to right,
  rgba(0,0,0,.08),
  rgba(0,0,0,.38)
  );

  z-index:2;
}

/* =========================================
   LLUVIA
========================================= */

.rain{
  position:absolute;
  inset:0;
  z-index:3;
  overflow:hidden;
  pointer-events:none;
}

.rain span{
  position:absolute;
  bottom:100%;

  width:1px;
  height:120px;

  background:
  linear-gradient(
  to bottom,
  rgba(255,255,255,0),
  rgba(255,196,0,.35),
  rgba(255,255,255,0));

  opacity:.18;

  animation:
  rain linear infinite;
}

.rain span:nth-child(1){ left:5%; animation-duration:1.2s; }
.rain span:nth-child(2){ left:15%; animation-duration:1.4s; }
.rain span:nth-child(3){ left:25%; animation-duration:1.1s; }
.rain span:nth-child(4){ left:35%; animation-duration:1.7s; }
.rain span:nth-child(5){ left:45%; animation-duration:1.3s; }
.rain span:nth-child(6){ left:55%; animation-duration:1.6s; }
.rain span:nth-child(7){ left:65%; animation-duration:1.2s; }
.rain span:nth-child(8){ left:75%; animation-duration:1.5s; }
.rain span:nth-child(9){ left:85%; animation-duration:1.2s; }
.rain span:nth-child(10){ left:95%; animation-duration:1.7s; }

@keyframes rain{

  0%{
    transform:
    translateY(-120vh)
    rotate(12deg);
  }

  100%{
    transform:
    translateY(120vh)
    rotate(12deg);
  }
}

/* =========================================
   TOPBAR
========================================= */

.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;

  z-index:20;

  height:90px;

  display:flex;
  align-items:center;
  justify-content:flex-end;

  gap:18px;

  padding:0 40px;

  background:
  linear-gradient(
  to bottom,
  rgba(0,0,0,.45),
  rgba(0,0,0,0)
  );
}

.table-pill{
  padding:14px 24px;

  border-radius:14px;

  border:
  1px solid rgba(255,196,0,.55);

  color:#fff;

  font-weight:800;

  background:
  rgba(0,0,0,.45);

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 20px rgba(255,196,0,.12);
}

.cart-icon{
  width:55px;
  height:55px;

  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  color:#fff;

  border:
  1px solid rgba(255,196,0,.5);

  background:
  rgba(0,0,0,.45);

  position:relative;

  backdrop-filter:blur(10px);
}

.cart-icon b{
  position:absolute;
  top:-8px;
  right:-8px;

  width:24px;
  height:24px;

  border-radius:50%;

  background:#ffc400;
  color:#000;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:12px;
}

/* =========================================
   CONTENT
========================================= */

.hero-content{
  position:relative;
  z-index:10;

  width:100%;
  height:100vh;

  display:flex;
  align-items:flex-end;
  justify-content:center;

  padding-bottom:90px;
}

/* =========================================
   INFO
========================================= */

.hero-info{

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:24px;
}

.burger-eyebrow{

  color:#ffc400;

  font-size:14px;
  font-weight:900;

  letter-spacing:6px;

  text-transform:uppercase;

  text-shadow:
  0 4px 14px rgba(0,0,0,.95),
  0 0 18px rgba(255,196,0,.18);

  padding:16px 26px;

  border-radius:18px;

  background:
  rgba(0,0,0,.28);

  border:
  1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(12px);

  box-shadow:
  0 14px 35px rgba(0,0,0,.35);
}

/* =========================================
   BOTONES
========================================= */

.hero-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

.btn-primary,
.btn-ghost,
.btn-promo{
  min-width:240px;
  height:68px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  font-weight:900;

  font-size:17px;

  transition:.25s;
}

.btn-primary{
  background:#ffc400;
  color:#000;

  box-shadow:
  0 0 35px rgba(255,196,0,.35);
}

.btn-primary:hover{
  transform:translateY(-3px);
}

.btn-ghost{
  color:#fff;

  border:
  1px solid rgba(255,255,255,.16);

  background:
  rgba(255,255,255,.04);

  backdrop-filter:blur(10px);
}

.btn-ghost:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.08);
}

.btn-promo{

  color:#000;

  background:
  linear-gradient(
  135deg,
  #ffc400,
  #ffdd55
  );

  box-shadow:
  0 0 40px rgba(255,196,0,.28);
}

.btn-promo:hover{
  transform:translateY(-3px) scale(1.02);

  box-shadow:
  0 0 55px rgba(255,196,0,.45);
}

/* =========================================
   RESPONSIVE
========================================= */

@media(max-width:900px){

  html,
  body{
    overflow:auto;
  }

  .hero-content{
    justify-content:flex-end;
    padding:120px 20px 60px;
  }

  .hero-actions{
    flex-direction:column;
    width:100%;
  }

  .btn-primary,
  .btn-ghost,
  .btn-promo{
    width:100%;
  }

  .burger-eyebrow{
    text-align:center;
    font-size:10px;
    letter-spacing:3px;
    width:100%;
  }

  .hero-background img{
    object-position:center;
  }

  .topbar{
    padding:0 20px;
  }

  .hero-video-wrap{
    width:100%;
    opacity:.72;
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="hero-background">

  <img
    src="assets/img/hero-background.png"
    alt="Hero Background"
  >

</div>

<!-- VIDEO -->

<div class="hero-video-wrap">

  <video
    class="hero-video"
    autoplay
    muted
    loop
    playsinline
  >

    <source
      src="assets/video/burger.mp4"
      type="video/mp4"
    >

  </video>

</div>

<!-- OVERLAY -->

<div class="hero-overlay"></div>

<!-- LLUVIA -->

<div class="rain">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- TOPBAR -->

<header class="topbar">


  <a class="cart-icon" href="resumen.html">
    🛒 <b>0</b>
  </a>

</header>

<!-- CONTENT -->

<main class="hero-content">

  <div class="hero-info">

    <p class="burger-eyebrow">
      PAN BRIOCHE ARTESANAL · MEDALLONES DE 140G
    </p>

    <div class="hero-actions">

      <a href="menu.html" class="btn-primary">
        EMPEZAR PEDIDO
      </a>

      <a href="promos.html" class="btn-promo">
        PROMOS
      </a>

    </div>

  </div>

</main>

</body>
</html>
